<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="600"
	height="720" version="1.1">



    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0167d9"/>
            <stop offset="100%" stop-color="#003e8a"/>
        </linearGradient>
    </defs>
	
    <rect width="100%" height="100%" fill="url(#bgGradient)" />

	<image x="30" y="30" width="120" height="180"
		xlink:href="data:image/png;base64,"
	/>

	<image x="185" y="30" width="330"
    xlink:href="{{photo}}"
	/>

	<text x="190" y="165" font-family="Roboto, Helvetica, sans-serif" font-size="30" fill="#ffffff" font-weight="bold">European Student</text>
	<text x="190" y="205" font-family="Roboto, Helvetica, sans-serif" font-size="30" fill="#ececec" font-weight="normal">Identity Card</text>

	<text x="30" y="260" font-family="Roboto, Helvetica, sans-serif" font-size="28" fill="#e2e2e2" font-weight="light">{{cardNumber}}</text>
	<text x="30" y="310" font-family="Roboto, Helvetica, sans-serif" font-size="27" fill="#e2e2e2" font-weight="light">{{firstNameEn}} {{lastNameEn}}</text>

  <!-- Your white panel -->
  <rect x="50" y="350" width="500" height="330" fill="#ffffff" rx="15" ry="15" />

  <!-- Base64 Image (Unknown Dimensions) -->
  <image
    x="50"
    y="350"
    width="500"
    preserveAspectRatio="xMidYMid meet"
    href="{{QRCode}}"
  />
</svg>